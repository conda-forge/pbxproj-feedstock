{% set name = "pbxproj" %}
{% set version = "4.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f342ceaf83d56e8c8e18fc13c92627b487b566812a17a4f042214742d3f5bcba

build:
  number: 0
  noarch: python
  entry_points:
    - pbxproj = pbxproj.__main__:main
    - pbxproj-file = pbxproj.pbxcli.pbxproj_file:main
    - pbxproj-flag = pbxproj.pbxcli.pbxproj_flag:main
    - pbxproj-folder = pbxproj.pbxcli.pbxproj_folder:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - coverage
    - nose
    - pip
    - python {{ python_min }}
  run:
    - docopt
    - openstep-parser >=1.5.1
    - python >={{ python_min }}

test:
  imports:
    - pbxproj
    - pbxproj.pbxcli
  commands:
    - pip check
    - pbxproj --help
    - pbxproj-file --help
    - pbxproj-flag --help
    - pbxproj-folder --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/kronenthaler/mod-pbxproj
  license: MIT
  summary: XCode Project manipulation library for Python
  license_file: license.txt
  description: |
    This module can read, modify, and write a .pbxproj file from an Xcode 4+ projects. 

extra:
  recipe-maintainers:
    - cav71
